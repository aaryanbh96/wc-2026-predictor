name: Update World Cup results

on:
  schedule:
    # every 15 minutes — GitHub's cron is best-effort and often skips runs,
    # so a tighter interval means results still land within ~15-30 min even if some are dropped.
    - cron: "*/15 * * * *"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

permissions:
  contents: write          # needed to commit results.json back to the repo

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch finished results
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: python scripts/inspect_knockout.py

      - name: Commit if changed
        run: |
          git config user.name  "wc-results-bot"
          git config user.email "actions@github.com"
          if ! git diff --quiet -- results.json; then
            git add results.json
            git commit -m "Update results.json ($(date -u +'%Y-%m-%dT%H:%MZ'))"
            git push
          else
            echo "No changes to results.json"
          fi
