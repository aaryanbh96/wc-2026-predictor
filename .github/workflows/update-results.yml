name: Update World Cup results
on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Fetch finished results
        env:
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: python scripts/fetch_results.py
      - name: Commit if changed
        run: |
          git config user.name  "wc-results-bot"
          git config user.email "actions@github.com"
          git add results.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update results.json ($(date -u +'%Y-%m-%dT%H:%MZ'))"
            git push
          fi
